<div class="container mt-4">
  <h2>{{ isNew ? 'New Subject' : 'Edit Subject' }}</h2>
  <form #subjectForm="ngForm" (ngSubmit)="save()">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" placeholder="e.g. Adatbázisrendszerek" [(ngModel)]="subject.name" name="name" required>
    </div>
    <button type="submit" [disabled]="subjectForm.invalid" class="btn btn-primary">Save</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="cancel()">Cancel</button>
  </form>
</div>
