<div class="container mt-4">
  <h2>Manage Courses</h2>

  <button class="btn btn-success mb-3" (click)="createCourse()">New Course</button>

  <table class="table table-striped table-hover border">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Subject</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (course of courses(); track course.id) {
        <tr>
          <td>{{ course.name }}</td>
          <td>{{ course.subject.name }}</td>
          <td>
            <button class="btn btn-sm btn-primary me-2" (click)="editCourse(course)">Edit</button>
            <button class="btn btn-sm btn-danger" (click)="deleteCourse(course)">Remove</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
