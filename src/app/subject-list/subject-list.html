<div class="container mt-4">
  <h2>Manage Subjects</h2>

  <button class="btn btn-success mb-3" (click)="createSubject()">New Subject</button>

  <table class="table table-striped table-hover border">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (subject of subjects(); track subject.id) {
        <tr>
          <td>{{ subject.name }}</td>
          <td>
            <button class="btn btn-sm btn-primary me-2" (click)="editSubject(subject)">Edit</button>
            <button class="btn btn-sm btn-danger" (click)="deleteSubject(subject)">Remove</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
